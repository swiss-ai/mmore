synonyms_path: examples/paper_discovery/synonyms.json
output_file: examples/paper_discovery/papers.json
pdf_dir: examples/paper_discovery/pdf_cache

sources:
  - openalex
  - europepmc
  - arxiv

download_pdfs: true
max_pages: 2
max_results: 25

# Reuse PDFs already in pdf_dir from previous runs. Set true to force
# re-downloading everything (e.g. after a publisher updates a paper).
force_redownload: false

# Optional EZproxy prefix for institutional access to paywalled PDFs.
# Example for EPFL: "https://login.proxy.epfl.ch"
# pdf_proxy_prefix: "https://login.proxy.epfl.ch"

user_agent: "mmore-paper-discovery/1.0 (https://github.com/swiss-ai/mmore)"

categories:
  Broad Foundational Search:
    - Foundation model
    - Machine Learning
  Humanitarian AI Search:
    - Foundation model
    - Humanitarian & Crisis Response

arxiv_category_map:
  Foundational: cs.LG
  Humanitarian: cs.CY
