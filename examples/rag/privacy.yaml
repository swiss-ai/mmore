  llm:
    llm_name: Qwen/Qwen2.5-3B-Instruct
  # system_prompt: ...  # optional
verifier:
  checks: [residual_leakage, faithfulness]
  warn_threshold: 0.5
  llm:
    llm_name: Qwen/Qwen2.5-3B-Instruct
