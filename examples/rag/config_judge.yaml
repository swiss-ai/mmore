rag:
  llm:
    llm_name: meta-llama/Llama-3.1-8B-Instruct
    max_new_tokens: 1200
  retriever:
    db:
      uri: ./proc_demo.db
      name: 'my_db'
    hybrid_search_weight: 0.5
    k: 5
    use_web: false
    reranker_model_name: BAAI/bge-reranker-base
  # No rag.judge.mode: only LLM judge exists (LLMJudge).
  judge:
    llm:
      llm_name: meta-llama/Llama-3.1-8B-Instruct
      max_new_tokens: 512
    system_prompt: |
      You are a retrieval quality judge for a medical RAG system (English only).
      In one step: (1) score context relevance 1-10, (2) read Threshold check (PASS/FAIL),
      (3) pick ONE decision from Allowed actions.
      
      Hard rules (mandatory):
      - Respond with a single fully filled valid JSON object only (no markdown fences, no commentary).
      - Use real numbers and booleans — never copy placeholder syntax like <1-10> or <true|false>.
      - Keep "reason" to one short sentence (max 120 chars). Do not paste chunk text into JSON strings.
      - decision must be exactly one of: PROCEED, ADD_QUESTIONS, ADD_CONTEXT, RE_RETRIEVE.
      - If after_correction is false and Threshold check contains any FAIL: do NOT choose PROCEED.
      - Choose PROCEED only if all PASS, or after_correction=true AND score>=8 AND chunks explicit. 
      - If corrective_actions_used >= max_corrective_steps → PROCEED only.
      - Never choose an action not listed under Allowed actions.
      - Do not leave decision or reason empty.

      Return one JSON object with the keys listed below (replace every value for the current question):
      - context_relevance_score: integer 1-10 (your judgment after reading chunks)
      - sufficient: boolean
      - decision: exactly one value from Allowed actions
      - reason: one short sentence, max 120 chars
      - extra_questions: array of strings; use [] unless decision is ADD_QUESTIONS
      - web_query: string or null; set only for ADD_CONTEXT
      - retrieve_params.input: reformulated query or null; retrieve_params.k: integer or null (e.g. 10 for RE_RETRIEVE)

      Action guidelines:
      - RE_RETRIEVE: Chunks are mostly irrelevant or the query wording hurt retrieval. Set retrieve_params.input (reformulated query) and/or k=10.
      - ADD_QUESTIONS: Multi-part clinical question; provide 1-3 specific extra_questions, then retrieval applies per question.
      - ADD_CONTEXT: Indexed corpus likely lacks the fact (novel drug, missing source). Set web_query; last resort — not for facts probably already in the corpus.
      - PROCEED: All metrics PASS and chunks support a grounded medical answer.
    user_prompt: |
      ## Inputs

      Question: {query}

      correction_step: {correction_step}
      corrective_actions_used: {corrective_actions_used}
      max_corrective_steps: {max_corrective_steps}
      remaining_corrective_steps: {remaining_corrective_steps}
      after_correction: {after_correction}

      Retrieval metrics (numeric; context_relevance_score is yours to set in JSON):
      {metrics}

      Threshold check (compare each line to Configured thresholds):
      {metrics_status}

      Configured thresholds: {thresholds}

      Allowed actions: {allowed_actions}

      Retrieved chunks:
      {chunks}

      Return JSON only.
    metric_thresholds:
      min_mean_similarity: 0.5
      min_max_rerank_score: 1.0
      min_mean_rerank_score: 0.5
      min_num_docs: 3
    max_corrective_steps: 1
    allow_add_questions: true
    allow_add_context: true
    allow_re_retrieve: true
    max_web_results: 5
    # force_corrective_action: RE_RETRIEVE  # skip judge LLM; force action when thresholds fail
    # force_corrective_action: PROCEED      # baseline benchmark: no LLM, no correction when thresholds fail
  system_prompt: "Use the following context to answer the questions.\n\nContext:\n{context}"
mode: local
mode_args:
  input_file: examples/rag/queries.jsonl
  output_file: examples/rag/output_judge.json
