rag:
  llm:
    llm_name: meta-llama/Llama-3.1-8B-Instruct
    max_new_tokens: 1200
  retriever:
    db:
      uri: ./proc_demo.db
      name: 'my_db'
    hybrid_search_weight: 0.5
    k: 5
    use_web: false
    reranker_model_name: BAAI/bge-reranker-base
  # No rag.judge.mode: only LLM judge exists (LLMJudge).
  judge:
    llm:
      llm_name: meta-llama/Llama-3.1-8B-Instruct
      max_new_tokens: 512
    # true: skip judge LLM and corrective loop; false: judge when index thresholds fail
    skip_llm_judge: false
    system_prompt: |
      You are a retrieval quality judge for a medical RAG system.
      Decide whether the retrieved context is sufficient to answer the user question,
      or which single corrective action to take next.

      You are only called when at least one configured index threshold has FAILED.
      Index scores (similarity, rerank, num_docs) are signals — read the chunks first.

      ## Decisions (pick exactly one listed under Allowed actions in the user message)

      PROCEED
        Context is enough to answer very satisfactorily.
        Also mandatory when corrective_actions_used >= max_corrective_steps.

      RE_RETRIEVE
        Chunks are mostly irrelevant or the query wording hurt retrieval.
        Set retrieve_params.input (reformulated query) and/or k=10.

      ADD_QUESTIONS
        Question is multi-part; relevant material may exist under sub-questions.
        Provide 1–3 specific extra_questions (searched and merged separately).

      ADD_CONTEXT
        Indexed corpus likely lacks the fact (novel drug, missing source).
        Set web_query; last resort — not for facts probably already in the corpus.

      ## Rules
      - decision must be one of Allowed actions (not the full enum if restricted).
      - If corrective_actions_used >= max_corrective_steps → PROCEED only.
      - Base the call on chunk content, not scores alone.

      ## Output
      Return one JSON object only (no markdown). Example:
      {
        "context_relevance_score": 6,
        "decision": "RE_RETRIEVE",
        "reason": "One short sentence.",
        "extra_questions": [],
        "web_query": null,
        "retrieve_params": {"input": "reformulated query", "k": 10}
      }
      context_relevance_score: integer 1–10 (your judgment after reading chunks; for logging only).
    user_prompt: |
      ## Inputs

      user_question: {query}

      correction_step: {correction_step} (evaluation pass; starts at 1)
      corrective_actions_used: {corrective_actions_used}
      max_corrective_steps: {max_corrective_steps}
      remaining_corrective_steps: {remaining_corrective_steps}
      after_correction: {after_correction}

      index_metrics (from Milvus + reranker):
      {metrics}

      threshold_check (index thresholds already failed at least once):
      {metrics_status}

      allowed_actions: {allowed_actions}

      retrieved_chunks:
      {chunks}

      Return JSON only.
    metric_thresholds:
      min_mean_similarity: 0.5
      min_max_rerank_score: 1.0
      min_mean_rerank_score: 0.5
      min_num_docs: 3
    max_corrective_steps: 1
    allow_add_questions: true
    allow_add_context: true
    allow_re_retrieve: true
    max_web_results: 5
  system_prompt: "Use the following context to answer the questions.\n\nContext:\n{context}"
mode: local
mode_args:
  input_file: examples/rag/queries.jsonl
  output_file: examples/rag/output_judge.json
