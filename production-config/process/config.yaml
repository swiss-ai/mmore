input_path: $ROOT_IN_DIR/sample_data/
output_path: $ROOT_OUT_DIR/process/outputs/

use_fast_processors: false
extract_images: true
distributed: false
scheduler_file: $ROOT_OUT_DIR/scheduler-file.json

batch_sizes:
  URLProcessor: 40
  DOCXProcessor: 100
  PDFProcessor: 4000
  MediaProcessor: 40
  SpreadsheetProcessor: 100
  TextProcessor: 100
  PPTXProcessor: 100
  MarkdownProcessor: 100
  EMLProcessor: 100
  HTMLProcessor: 100

processors:
  MediaProcessor:
    normal_model: openai/whisper-large-v3-turbo
    fast_model: openai/whisper-tiny
    frame_sample_rate: 10
  PDFProcessor:
    # PDF extraction backend. One of:
    #   marker       (default) - marker-pdf, GPU-accelerated OCR, slow but
    #                            accurate; supports scanned documents.
    #   pymupdf4llm  - LLM-friendly markdown via pymupdf4llm; much faster
    #                  but does not OCR scanned documents.
    #                  See https://pymupdf.readthedocs.io/en/latest/pymupdf4llm/
    #   mistral      - cloud OCR via Mistral's `mistral-ocr-latest` API;
    #                  high quality on scanned documents and multilingual
    #                  content. Requires a Mistral API key
    #                  (mistral_api_key field below or MISTRAL_API_KEY env var).
    backend: marker
    # Mistral backend options (only used when backend: mistral)
    # mistral_api_key: $MISTRAL_API_KEY
    # mistral_model: mistral-ocr-latest
    # mistral_max_calls_per_second: 5
    # mistral_max_retries: 3

