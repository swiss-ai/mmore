name: 📐 Pyright type checks
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  pyright-base:
    name: "Pyright (base: process + tui)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pipx install uv

      - name: Install dependencies
        run: uv venv .venv && source .venv/bin/activate && uv pip install -e ".[process,index,rag,api,tui,cpu,dev,websearch]"

      - name: Run Pyright (base + tui)
        run: source .venv/bin/activate && pyright --project pyrightconfig.json

      - name: Run Pyright (tui)
        run: source .venv/bin/activate && pyright --project pyrightconfig.tui.json

  pyright-colvision:
    name: "Pyright (colvision + tui)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pipx install uv

      - name: Install dependencies
        run: uv venv .venv && source .venv/bin/activate && uv pip install -e ".[colvision,tui,cpu,dev]"

      - name: Run Pyright (colvision)
        run: source .venv/bin/activate && pyright --project pyrightconfig.colvision.json

      - name: Run Pyright (tui)
        run: source .venv/bin/activate && pyright --project pyrightconfig.tui.json
