name: 📐 Pyright type checks
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv and create venv
        run: |
          pipx install uv
          uv venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[process,index,rag,api,cpu,dev,websearch,privacy,paper_discovery]"

      - name: Run Pyright
        continue-on-error: true
        run: |
          source .venv/bin/activate
          pyright

      - name: Install dependencies - colvision
        run: |
          uv venv .venv-colvision
          source .venv-colvision/bin/activate
          uv pip install -e ".[colvision,cpu,dev]"

      - name: Run Pyright - colvision
        continue-on-error: true
        run: |
          source .venv-colvision/bin/activate
          pyright src/mmore/colvision
