name: 🧪 PyTest GPU tests (RCP)

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        required: false
        default: "3.11"
        type: choice
        options:
          - "3.11"
          - "3.12"

# Example RunAI job to host the runner:
#   runai submit github-runner \
#     --image ghcr.io/swiss-ai/mmore:edge-gpu \
#     --gpu 1 -p mmore \
#     --command -- /path/to/run_github_runner.sh

jobs:
  test-gpu:
    runs-on: [self-hosted, gpu, rcp]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GPU availability
        run: nvidia-smi

      - name: Install uv
        run: pipx install uv

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[process,index,rag,api,cu126,dev]"

      - name: Run GPU tests
        run: |
          source .venv/bin/activate
          pytest --gpu -m gpu -v
